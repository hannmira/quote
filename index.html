<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=600">
    <title>발췌 이미지 생성기</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style id="webfont">
    </style>
    <style>
        html,
        body,
        div,
        p,
        fieldset,
        input,
        textarea,
        select,
        button,
        label {
            margin: 0;
            padding: 0;
        }

        fieldset,
        input,
        textarea,
        select,
        button,
        label {
            font-family: sans-serif;
            font-size: 16px;
        }

        fieldset,
        input,
        select,
        button,
        label {
            line-height: 1;
        }


        body {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
        }

        #result-wrapper {
            width: 600px;
            height: 600px;
            transform: scale(0.5);
            transform-origin: top left;
        }

        #result {
            position: relative;
            width: 1200px;
            height: 1200px;
            color: white;
            text-align: justify;
            overflow: hidden;
            background-color: gray;
            z-index: -1;
        }

        #background-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            object-fit: cover;
        }

        #container {
            position: absolute;
            top: 120px;
            left: 90px;
            width: 1020px;
            height: 960px;
            z-index: 1;
        }

        #quotes-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 1020px;
        }

        #title-container p,
        #author-container p {
            font-family: 'Pretendard';
            font-size: 48px;
            text-align: left;
            word-break: keep-all;
        }

        #title-container {
            position: absolute;
            bottom: 62px;
            line-height: 1.2;
            font-weight: 300;
        }

        #author-container {
            position: absolute;
            bottom: 0;
            line-height: 1;
            font-weight: 100;
        }

        .controls {
            width: 580px;
            position: relative;
            margin: 0;
            padding: 0 10px 10px 10px;
        }

        fieldset {
            display: flex;
            flex-direction: column;
            width: 580px;
            padding: 10px 0 10px 0;
            border-color: gray;
            border-width: 0 0 1px 0;
            border-style: solid;
            gap: 10px;
            align-content: space-around;
            justify-content: space-between;
        }

        .flex-container {
            display: flex;
            width: 100%;
            box-sizing: border-box;
            justify-content: space-between;
            align-items: center;
        }

        .flex-container>div {
            display: flex;
            align-items: center;
        }

        .flex-container-coloumn {
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 100%;
            box-sizing: border-box;
            justify-content: space-between;
        }

        #image-controls {
            vertical-align: middle;
        }
        
        #image-controls button {
            width: 20px;
            margin: 0 3px;
            padding: 0;
        }

        #title {
            flex: 1;
        }

        label {
            font-weight: 500;
            margin-right: 3px;
        }

        sub {
            vertical-align: baseline;
            margin-left: 1px;
            font-weight: 300;
        }

        textarea,
        input,
        select {
            padding: 2px;
        }

        #bgUrl {
            flex: 1;
        }

        textarea {
            display: block;
            width: 100%;
            box-sizing: border-box;
            word-break: break-all;
        }

        input[type="number"] {
            appearance: textfield;
            -webkit-appearance: textfield;
            -moz-appearance: textfield;
        }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
        }

        .number-input {
            display: inline-flex;
            border: 1px solid #aaa;
            box-sizing: border-box;
            height: 24px;
        }

        .number-input * {
            box-sizing: border-box;
        }

        .number-input input[type=number] {
            width: 34px;
            padding: 0;
            font-family: 'Pretendard';
            font-feature-settings: "tnum", "lnum";
            text-align: center;
            border: solid #aaa;
            border-width: 0 1px;
        }

        .number-input button {
            width: 20px;
            padding: 0;
            margin: 0;
            border: none;
            background-color: transparent;
            -webkit-appearance: none;
            outline: none;
        }

        input#title {
            width: 290px;
        }

        input#author {
            width: 120px;
        }

        #local {
            padding: 1px;
            margin: 0;
        }

        select#quoteColor {
            width: 100px;
        }

        button {
            margin: 10px 5px 0 0;
            padding: 10px 20px;
        }

        button.right {
            float: right;
            margin-right: 0;
        }

        input+label,
        select+label {
            margin-left: 20px;
        }
    </style>
</head>
<body>
    <div id="result-wrapper">
        <div id="result">
            <img id="background-img" crossorigin="anonymous" onerror="this.remove()">
            <div id="container">
                <div id="quotes-container">
                    <div id="quotesOutput">
                    </div>
                </div>
                <div id="title-container">
                    <p id="titleOutput"></p>
                </div>
                <div id="author-container">
                    <p id="authorOutput"></p>
                </div>
            </div>
        </div>
    </div>
    <div class="controls">
        <fieldset>
            <div class="flex-container-coloumn">
                <div class="flex-container">
                    <label>발췌 문장</label>
                    <a href="#" onclick="clearInputs('quotes', 'title', 'author')">지우기</a>
                </div>
                <textarea id="quotes" rows="5">이에 재판관 전원의 일치된 의견으로 주문을 선고합니다. 탄핵 사건이므로 선고시각을 확인하겠습니다. 지금 시각은 오전 11시 22분입니다.
주문: 피청구인 대통령 윤석열을 파면한다.
이것으로 선고를 마칩니다.</textarea>
            </div>
            <div class="flex-container">
                <label>글 제목</label>
                <input id="title" type="text" value="2024헌나8 대통령(윤석열)탄핵 선고요지">
                <label>저자 이름</label>
                <input id="author" type="text" value="헌법재판소">
            </div>
        </fieldset>
        <fieldset>
            <div class="flex-container-coloumn">
                <div class="flex-container">
                    <div>
                        <label>배경 이미지 URL(<a href="https://unsplash.com" target="_blank" rel="noopener noreferrer">Unsplash</a>) 또는</label><button id="local" onclick="clickFileInput()">로컬 파일</button>
                    </div>
                    <div id="image-controls">
                        <button onclick="zoom(1.1)">+</button>
                        <button onclick="zoom(0.9)">-</button>
                        <div style="width:7px;text-align: center;">|</div>
                        <button onclick="move(0, -30)">▲</button>
                        <button onclick="move(0, 30)">▼</button>
                        <button onclick="move(-30, 0)">◀</button>
                        <button onclick="move(30, 0)">▶</button>
                        <div style="width:7px;text-align: center;">|</div>
                        <button onclick="resetImage()">↺</button>
                    </div>
                    <input type="file" id="fileInput" accept="image/*" style="display: none;">
                    <a href="#" onclick="clearInputs('bgUrl')">지우기</a>
                </div>
                <input id="bgUrl" value="https://images.unsplash.com/photo-1739659153856-ae22a5d2390a?q=80&w=1964&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
            </div>
            <form id="imageFilters" class="flex-container">
                <div>
                    <label>밝기<sub>%</sub></label>
                    <div class="number-input">
                        <button class="minus" type="button">−</button>
                        <input id="brightness" type="number" value="70" step="10">
                        <button class="plus" type="button">+</button>
                    </div>
                </div>
                <div>
                    <label>대비<sub>%</sub></label>
                    <div class="number-input">
                        <button class="minus" type="button">−</button>
                        <input id="contrast" type="number" value="100" step="10">
                        <button class="plus" type="button">+</button>
                    </div>
                </div>
                <div>
                    <label>채도<sub>%</sub></label>
                    <div class="number-input">
                        <button class="minus" type="button">−</button>
                        <input id="saturate" type="number" value="100" step="10">
                        <button class="plus" type="button">+</button>
                    </div>
                </div>
                <div>
                    <label>흐리게<sub>px</sub></label>
                    <div class="number-input">
                        <button class="minus" type="button">−</button>
                        <input id="blur" type="number" value="0" step="1">
                        <button class="plus" type="button">+</button>
                    </div>
                </div>
            </form>
        </fieldset>
        <form id="textSettings">
            <fieldset>
                <div class="flex-container">
                    <div>
                        <label>글꼴</label>
                        <select id="fontSelect">
                            <option value="RIDIBatang">리디바탕</option>
                            <option value="Pretendard">프리텐다드</option>
                            <option value="GangwonEdu">강원교육모두체</option>
                            <option value="GangwonEduSaeeum">강원교육새음체</option>
                            <option value="GowunDodum">고운돋움</option>
                            <option value="InkLipquid">잉크립퀴드체</option>
                            <option value="HakgyoansimGaeulsopung">학교안심 가을소풍</option>
                            <option value="HakgyoansimChilpanjiugaeTTF">학교안심 칠판지우개</option>
                        </select>
                    </div>
                    <div>
                        <label>글씨 크기<sub>px</sub></label>
                        <div class="number-input">
                            <button class="minus" type="button">−</button>
                            <input id="quoteSize" type="number" value="50" step="1">
                            <button class="plus" type="button">+</button>
                        </div>
                    </div>
                    <div>
                        <label>글씨 색</label>
                        <select id="quoteColor">
                            <option value="White">White</option>
                            <option value="Black">Black</option>
                            <option value="DarkBlue" style="color:DarkBlue">DarkBlue</option>
                            <option value="DarkGray" style="color:DarkGray">DarkGray</option>
                            <option value="DarkGreen" style="color:DarkGreen">DarkGreen</option>
                            <option value="DarkRed" style="color:DarkRed">DarkRed</option>
                            <option value="LightBlue" style="color:LightBlue">LightBlue</option>
                            <option value="LightGray" style="color:LightGray">LightGray</option>
                            <option value="LightGreen" style="color:LightGreen">LightGreen</option>
                            <option value="LightPink" style="color:LightPink">LightPink</option>
                        </select>
                    </div>
                </div>
                <div class="flex-container">
                    <div>
                        <label>줄높이</label>
                        <div class="number-input">
                            <button class="minus" type="button">−</button>
                            <input id="quoteLineHeight" type="number" value="1.6" step="0.1">
                            <button class="plus" type="button">+</button>
                        </div>
                    </div>
                    <div>
                        <label>문단간격<sub>em</sub></label>
                        <div class="number-input">
                            <button class="minus" type="button">−</button>
                            <input id="quoteMargin" type="number" value="1" step="0.1">
                            <button class="plus" type="button">+</button>
                        </div>
                    </div>
                    <div>
                        <label>자간<sub>px</sub></label>
                        <div class="number-input">
                            <button class="minus" type="button">−</button>
                            <input id="quoteLetterSpacing" type="number" value="-1" step="1">
                            <button class="plus" type="button">+</button>
                        </div>
                    </div>
                    <div>
                        <label>어간<sub>px</sub></label>
                        <div class="number-input">
                            <button class="minus" type="button">−</button>
                            <input id="quoteWordSpacing" type="number" value="0" step="1">
                            <button class="plus" type="button">+</button>
                        </div>
                    </div>
                </div>
            </fieldset>
        </form>
        <button type="submit" onclick="downloadImage()">이미지로 저장</button>
        <button type="submit" onclick="saveHTML()">HTML로 저장</button>
        <button type="submit" class="right" onclick="reset()">서식 초기화</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>
    <script>
        const fontMap = {
            RIDIBatang: ['RIDIBatang', 'projectnoonnu/noonfonts_twelve@1.0/RIDIBatang.woff'],
            Pretendard: ['Pretendard', ''],
            GangwonEdu: ['GangwonEdu', 'projectnoonnu/noonfonts_2201-2@1.0/GangwonEdu_OTFLightA.woff'],
            GangwonEduSaeeum: ['GangwonEduSaeeum', 'projectnoonnu/noonfonts_2201-2@1.0/GangwonEduSaeeum_OTFMediumA.woff'],
            GowunDodum: ['GowunDodum', 'projectnoonnu/noonfonts_2108@1.1/GowunDodum-Regular.woff'],
            InkLipquid: ['InkLipquid', 'projectnoonnu/noonfonts_one@1.0/InkLipquid.woff'],
            HakgyoansimGaeulsopung: ['HakgyoansimGaeulsopung', 'projectnoonnu/noonfonts_2307-2@1.0/HakgyoansimGaeulsopungL.woff2'],
            HakgyoansimChilpanjiugaeTTF: ['HakgyoansimChilpanjiugaeTTF', 'projectnoonnu/2408-5@1.0/HakgyoansimChilpanjiugaeTTF-L.woff2'],
        };

        const buildFontFace = (name, url, format = 'woff') => `
@font-face {
font-family: '${name}';
src: url('https://fastly.jsdelivr.net/gh/${url}') format('${format}');
font-weight: normal;
font-style: normal;
}`;

        // 쿠키 관련
        function setCookie(name, value, days = 90) {
            const expires = new Date(Date.now() + days * 864e5).toUTCString();
            document.cookie = `${encodeURIComponent(name)}=${encodeURIComponent(value)}; expires=${expires}; path=/`;
        }

        function getCookie(name) {
            return document.cookie.split('; ').reduce((res, cookie) => {
                const [key, val] = cookie.split('=');
                return key === encodeURIComponent(name) ? decodeURIComponent(val) : res;
            }, '');
        }

        // 입력 저장/복원
        function saveInputsToCookies() {
            document.querySelectorAll('input, select, textarea').forEach(el => {
                if (el.id && el.type !== 'file') {
                    setCookie(el.id, el.value);
                }
            });
        }

        function loadInputsFromCookies() {
            document.querySelectorAll('input, select, textarea').forEach(el => {
                if (el.id && el.type !== 'file') {
                    const value = getCookie(el.id);
                    if (value !== '') el.value = value;
                }
            });
        }

        function clearInputs(...ids) {
            ids.forEach(id => document.getElementById(id).value = '');
            return false;
        }

        function removeInfoText() {
            const infoText = document.getElementById('info-text');
            if (infoText) {
                infoText.remove();
            }
        }
        function addInfoText() {
            const infoText = document.createElement('div');
            if (document.getElementById('info-text')) return;
            infoText.innerHTML = "HTML 저장 시 로컬 이미지 파일 배경은 저장되지 않습니다.";
            infoText.id = 'info-text'
            infoText.style.width = '180px';
            infoText.style.color = '#666';
            infoText.style.fontSize = '0.9em';
            infoText.style.display = 'inline-block';
            infoText.style.verticalAlign = 'middle';
            infoText.style.wordBreak = 'keep-all';
            document.querySelector('button[onclick="saveHTML()"]').insertAdjacentElement('afterend', infoText);
        }

        function setBgImgSrc(src) {
            const $ = id => document.getElementById(id);

            if (!$('background-img')) {
                const img = document.createElement("img");
                img.id = "background-img";
                img.onerror = function () {
                    this.remove(); // 이미지 로드 실패 시 제거
                };
                container.parentNode.insertBefore(img, $(container));
            }
            $('background-img').style.filter = `
brightness(${$('brightness').value}%)
contrast(${$('contrast').value}%)
saturate(${$('saturate').value}%)
blur(${$('blur').value}px)
`;

            if ($('bgUrl').value !== '로컬 이미지 파일') {
                $('background-img').src = $('bgUrl').value;
                removeInfoText();
            }
            else if (src) {
                $('background-img').src = src;
                addInfoText();
            }
        }

        const img = document.getElementById('background-img');
        const container = document.getElementById('container');
        let scale = 1;
        let translateX = 0;
        let translateY = 0;
        function updateTransform() {
            img.style.transform = `scale(${scale}) translate(${translateX}px, ${translateY}px)`;
        }
        function saveImageTransformToCookies() {
            setCookie('image_scale', scale);
            setCookie('image_translateX', translateX);
            setCookie('image_translateY', translateY);
        }
        function loadImageTransformFromCookies() {
            const savedScale = parseFloat(getCookie('image_scale'));
            const savedX = parseFloat(getCookie('image_translateX'));
            const savedY = parseFloat(getCookie('image_translateY'));

            if (!isNaN(savedScale)) scale = savedScale;
            if (!isNaN(savedX)) translateX = savedX;
            if (!isNaN(savedY)) translateY = savedY;

            updateTransform();
        }
        function zoom(factor) {
            scale *= factor;
            updateTransform();
            saveImageTransformToCookies();
        }
        function move(dx, dy) {
            translateX += dx;
            translateY += dy;
            updateTransform();
            saveImageTransformToCookies();
        }
        function resetImage() {
            scale = 1;
            translateX = 0;
            translateY = 0;
            updateTransform();
            saveImageTransformToCookies();
        }

        function clickFileInput() {
            fileInput.click();
        }
        document.getElementById('fileInput').addEventListener('change', () => {
            const file = fileInput.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                setBgImgSrc(e.target.result);
            };
            document.getElementById('bgUrl').value = '로컬 이미지 파일'
            saveInputsToCookies();
            reader.readAsDataURL(file);
        });

        // 텍스트 포맷팅
        function formatParagraphs(text) {
            return text.trim().split('\n').map(line => line.trim()).filter(Boolean).map(line => `<p>${line}</p>`).join('\n');
        }

        // 레이아웃 중앙 정렬
        function centerQuotesOutput() {
            const titleHeight = document.getElementById('title-container').scrollHeight;
            const containerHeight = 882 - titleHeight;
            const outputHeight = document.getElementById('quotesOutput').scrollHeight;
            const marginTop = (containerHeight - outputHeight) / 2;

            document.getElementById('quotes-container').style.height = `${containerHeight}px`;
            document.getElementById('quotesOutput').style.marginTop = `${marginTop}px`;
        }

        // 스타일 반영
        function applyChanges() {
            saveInputsToCookies();

            const $ = id => document.getElementById(id);

            $('quotesOutput').innerHTML = formatParagraphs($('quotes').value);
            $('titleOutput').textContent = $('title').value;
            $('authorOutput').textContent = $('author').value;

            setBgImgSrc();

            const [fontName, fontURL] = fontMap[$('fontSelect').value];
            if (fontName !== 'Pretendard') {
                $('webfont').innerHTML = buildFontFace(fontName, fontURL, fontURL.endsWith('.woff2') ? 'woff2' : 'woff');
            }

            $('result').style.color = $('quoteColor').value;
            document.querySelectorAll('#quotesOutput p').forEach(p => {
                p.style.fontFamily = fontName;
                p.style.fontSize = $('quoteSize').value + 'px';
                p.style.lineHeight = $('quoteLineHeight').value;
                p.style.marginBottom = $('quoteMargin').value + 'em';
                p.style.letterSpacing = $('quoteLetterSpacing').value + 'px';
                p.style.wordSpacing = $('quoteWordSpacing').value + 'px';
            });

            centerQuotesOutput();
            document.fonts.ready.then(function () {
                centerQuotesOutput();
            });
        }

        function bindNumberInputButtons() {
            document.querySelectorAll('.number-input').forEach(wrapper => {
                const input = wrapper.querySelector('input');

                wrapper.querySelector('.minus').addEventListener('click', e => {
                    e.preventDefault();
                    input.stepDown();
                    applyChanges();
                });

                wrapper.querySelector('.plus').addEventListener('click', e => {
                    e.preventDefault();
                    input.stepUp();
                    applyChanges();
                });
            });
        }

        // 이미지 다운로드
        function downloadImage() {
            const title = document.getElementById('title').value;
            const para = document.getElementById('quotes').value;
            const filename = `${title.slice(0, 10).trim()}-${para.slice(0, 10).trim()}`;

            htmlToImage.toJpeg(document.getElementById('result'), {
                quality: 0.95,
                width: 1200,
                height: 1200,
                pixelRatio: 1,
            }).then(dataUrl => {
                const link = document.createElement('a');
                link.download = `${filename}.jpg`;
                link.href = dataUrl;
                link.click();
            }).catch(error => console.error('이미지 저장 실패:', error));
        }

        // HTML 저장
        function saveHTML() {
            const title = document.getElementById('title').value;
            const para = document.getElementById('quotes').value;
            const filename = `${title.slice(0, 10).trim()}-${para.slice(0, 10).trim()}`;

            const styleHTML = document.querySelector('#webfont').outerHTML;

            let wrapperHTML = document.querySelector('#result-wrapper').outerHTML;
            if (document.getElementById('bgUrl').value === '로컬 이미지 파일') {
                wrapperHTML = wrapperHTML.replace(/<img\b[^>]*?>/gi, '');
            }

            const htmlContent = `
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=600">
<title>${document.getElementById('title').value}</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
${styleHTML}
<style>
html,
body,
div,
p {
    margin: 0;
    padding: 0;
}

#result-wrapper {
    width: 600px;
    height: 600px;
    transform: scale(0.5);
    transform-origin: top left;
}

#result {
    position: relative;
    width: 1200px;
    height: 1200px;
    color: white;
    text-align: justify;
    overflow: hidden;
    background-color: gray;
    z-index: -1;
}

        // 이벤트 바인딩
        function bindEvents() {
            document.querySelectorAll('form button:not([type="submit"])').forEach(btn =>
                btn.addEventListener('click', e => {
                    e.preventDefault();
                    applyChanges();
                })
            );

            const inputs = document.querySelectorAll('input, select, textarea');
            for (const el of inputs) {
                const eventType = el.tagName === 'SELECT' ? 'change' : 'input';
                el.addEventListener(eventType, () => {
                    applyChanges();
                });
            }

            bindNumberInputButtons();
        }

        window.addEventListener('DOMContentLoaded', () => {
