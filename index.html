<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.5">
    <title>발췌 이미지 생성기</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style id="webfont">
    </style>
    <style id="result-style">
    </style>
    <style id="control-style">
    </style>
</head>
<body>
    <div id="result-wrapper">
        <div id="result">
            <img id="background-img">
            <div id="container">
                <div id="quote-container">
                    <div id="quoteOutput">
                    </div>
                </div>
                <div id="title-container">
                    <p id="titleOutput"></p>
                </div>
                <div id="author-container">
                    <p id="authorOutput"></p>
                </div>
            </div>
        </div>
    </div>
    <div class="controls">
        <fieldset>
            <div class="flex-container-coloumn">
                <div class="flex-container">
                    <label>발췌 문장</label>
                    <a href="#" onclick="clearInputs('quote', 'title', 'author')">지우기</a>
                </div>
                <textarea id="quote" rows="5">이에 재판관 전원의 일치된 의견으로 주문을 선고합니다. 탄핵 사건이므로 선고시각을 확인하겠습니다. 지금 시각은 오전 11시 22분입니다.
주문: 피청구인 대통령 윤석열을 파면한다.
이것으로 선고를 마칩니다.</textarea>
            </div>
            <div class="flex-container">
                <label>글 제목</label>
                <input id="title" type="text" value="2024헌나8 대통령(윤석열)탄핵 선고요지">
                <label>저자 이름</label>
                <input id="author" type="text" value="헌법재판소">
            </div>
        </fieldset>
        <fieldset>
            <div class="flex-container-coloumn">
                <div class="flex-container">
                    <div>
                        <label>배경 이미지 URL 또는</label><button id="local" onclick="clickFileInput()">파일</button>
                    </div>
                    <div id="image-controls">
                        <button class="bg-button" onclick="zoom(1.05)">+</button>
                        <button class="bg-button" onclick="zoom(0.95)">-</button>
                        <div style="width:7px;text-align: center;">|</div>
                        <button class="bg-button" onclick="move(0, -2)" style="font-size: 0.8em">▲</button>
                        <button class="bg-button" onclick="move(0, 2)" style="font-size: 0.8em">▼</button>
                        <button class="bg-button" onclick="move(-2, 0)" style="font-size: 0.8em">◀</button>
                        <button class="bg-button" onclick="move(2, 0)" style="font-size: 0.8em">▶</button>
                    </div>
                    <div class="color-picker">
                        <input type="radio" name="bgColor" id="bgColor0" value="no" checked>
                        <label for="bgColor0" class="color-option">
                            <div style="text-align: center;">&times;</div>
                        </label>
                        <input type="radio" name="bgColor" id="bgColor1" value="gray">
                        <label for="bgColor1" class="color-option">
                            <div style="background-color: gray;"></div>
                        </label>
                        <input type="radio" name="bgColor" id="bgColor4" value="#ff002b">
                        <label for="bgColor4" class="color-option">
                            <div style="background-color: #ff002b;"></div>
                        </label>
                        <input type="radio" name="bgColor" id="bgColor5" value="#ffd500">
                        <label for="bgColor5" class="color-option">
                            <div style="background-color: #ffd500;"></div>
                        </label>
                        <input type="radio" name="bgColor" id="bgColor6" value="#2bff00">
                        <label for="bgColor6" class="color-option">
                            <div style="background-color: #2bff00;"></div>
                        </label>
                        <input type="radio" name="bgColor" id="bgColor7" value="#00ffd5">
                        <label for="bgColor7" class="color-option">
                            <div style="background-color: #00ffd5;"></div>
                        </label>
                        <input type="radio" name="bgColor" id="bgColor8" value="#002aff">
                        <label for="bgColor8" class="color-option">
                            <div style="background-color: #002aff;"></div>
                        </label>
                        <input type="radio" name="bgColor" id="bgColor9" value="#d400ff">
                        <label for="bgColor9" class="color-option">
                            <div style="background-color: #d400ff;"></div>
                        </label>
                    </div>
                    <input type="file" id="fileInput" accept="image/*" style="display: none;">
                </div>
                <div class="input-wrapper">
                    <input id="bgUrl">
                    <button id="clearBgUrl" type="button" onclick="clearInputs('bgUrl')">&times;</button>
                </div>
            </div>
            <form id="imageFilters" class="flex-container">
                <div>
                    <label>밝기<sub>%</sub></label>
                    <div class="number-input">
                        <button class="minus" type="button">−</button>
                        <input id="brightness" type="number" value="70" step="10">
                        <button class="plus" type="button">+</button>
                    </div>
                </div>
                <div>
                    <label>대비<sub>%</sub></label>
                    <div class="number-input">
                        <button class="minus" type="button">−</button>
                        <input id="contrast" type="number" value="100" step="10">
                        <button class="plus" type="button">+</button>
                    </div>
                </div>
                <div>
                    <label>채도<sub>%</sub></label>
                    <div class="number-input">
                        <button class="minus" type="button">−</button>
                        <input id="saturate" type="number" value="100" step="10">
                        <button class="plus" type="button">+</button>
                    </div>
                </div>
                <div>
                    <label>흐리게<sub>px</sub></label>
                    <div class="number-input">
                        <button class="minus" type="button">−</button>
                        <input id="blur" type="number" value="0" step="1">
                        <button class="plus" type="button">+</button>
                    </div>
                </div>
            </form>
        </fieldset>
        <form id="textStyle">
            <fieldset>
                <div class="flex-container">
                    <div>
                        <label>글꼴</label>
                        <select id="fontSelect">
                            <option value="RIDIBatang">리디바탕</option>
                            <option value="Pretendard" selected>프리텐다드</option>
                            <option value="GangwonEdu">강원교육모두체</option>
                            <option value="GangwonEduSaeeum">강원교육새음체</option>
                            <option value="GangwonEduHyeonokT">강원교육현옥샘체</option>
                            <option value="GowunDodum">고운돋움</option>
                            <option value="KyoboHand">교보손글씨 2019</option>
                            <option value="MapoFlowerIsland">마포꽃섬</option>
                            <option value="Handletter">손편지체</option>
                            <option value="Ownglyph_wiseelist">온글잎 위씨리스트</option>
                            <option value="InkLipquid">잉크립퀴드체</option>
                            <option value="localFont">사용자 파일</option>
                        </select>
                    </div>
                    <input type="file" id="fontInput" accept=".ttf,.otf,.woff,.woff2" style="display: none;">
                    <div>
                        <label>글씨 크기<sub>px</sub></label>
                        <div class="number-input">
                            <button class="minus" type="button">−</button>
                            <input id="quoteSize" type="number" value="52" step="1">
                            <button class="plus" type="button">+</button>
                        </div>
                    </div>
                    <div class="color-picker">
                        <input type="radio" name="fontColor" id="fontColor1" value="white" checked>
                        <label for="fontColor1" class="color-option">
                            <div style="background-color: white;"></div>
                        </label>
                        <input type="radio" name="fontColor" id="fontColor4" value="black">
                        <label for="fontColor4" class="color-option">
                            <div style="background-color: black;"></div>
                        </label>
                        <input type="radio" name="fontColor" id="fontColor5" value="#ff0800">
                        <label for="fontColor5" class="color-option">
                            <div style="background-color: #ff0800;"></div>
                        </label>
                        <input type="radio" name="fontColor" id="fontColor6" value="#0f52ba">
                        <label for="fontColor6" class="color-option">
                            <div style="background-color: #0f52ba;"></div>
                        </label>
                        <input type="radio" name="fontColor" id="fontColor7" value="#FFBF00">
                        <label for="fontColor7" class="color-option">
                            <div style="background-color: #FFBF00;"></div>
                        </label>
                        <input type="radio" name="fontColor" id="fontColor8" value="#FFB7C5">
                        <label for="fontColor8" class="color-option">
                            <div style="background-color: #FFB7C5;"></div>
                        </label>
                        <input type="radio" name="fontColor" id="fontColor9" value="#A4DDED">
                        <label for="fontColor9" class="color-option">
                            <div style="background-color: #A4DDED;"></div>
                        </label>
                        <input type="radio" name="fontColor" id="fontColor2" value="#F8DE7E">
                        <label for="fontColor2" class="color-option">
                            <div style="background-color: #F8DE7E;"></div>
                        </label>
                    </div>
                </div>
                <div class="flex-container">
                    <div>
                        <label>줄높이</label>
                        <div class="number-input">
                            <button class="minus" type="button">−</button>
                            <input id="quoteLineHeight" type="number" value="1.6" step="0.1">
                            <button class="plus" type="button">+</button>
                        </div>
                    </div>
                    <div>
                        <label>문단간격<sub>em</sub></label>
                        <div class="number-input">
                            <button class="minus" type="button">−</button>
                            <input id="quoteGap" type="number" value="1" step="0.1">
                            <button class="plus" type="button">+</button>
                        </div>
                    </div>
                    <div>
                        <label>자간<sub>px</sub></label>
                        <div class="number-input">
                            <button class="minus" type="button">−</button>
                            <input id="quoteLetterSpacing" type="number" value="-1" step="1">
                            <button class="plus" type="button">+</button>
                        </div>
                    </div>
                    <div>
                        <label>어간<sub>px</sub></label>
                        <div class="number-input">
                            <button class="minus" type="button">−</button>
                            <input id="quoteWordSpacing" type="number" value="0" step="1">
                            <button class="plus" type="button">+</button>
                        </div>
                    </div>
                </div>
            </fieldset>
        </form>
        <div class="flex-container">
            <div id="info-text">HTML로 저장 시 사용자 파일 또는 복사한 이미지는 저장되지 않습니다.</div>
            <button type="submit" onclick="saveHTML()">HTML로 저장</button>
            <button type="submit" onclick="downloadImage()">이미지로 저장</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/heic-to@1.1.13/dist/iife/heic-to.js"></script>
    <script>
        function loadHtmlToImageScript() {
            const script = document.createElement("script");
            if (/firefox/i.test(navigator.userAgent)) {
                script.src = "https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js";
            } else {
                script.src = "https://cdn.jsdelivr.net/npm/html-to-image@1.11.13/dist/html-to-image.min.js";
            }
            document.head.appendChild(script);
        }

        const fontMap = {
            DungGeunMo: ['DungGeunMo', 'https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff'],
            GangwonEdu: ['GangwonEdu', 'https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2201-2@1.0/GangwonEdu_OTFLightA.woff'],
            GangwonEduHyeonokT: ['GangwonEduHyeonokT', 'https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2201-2@1.0/GangwonEduHyeonokT_OTFMediumA.woff'],
            GangwonEduSaeeum: ['GangwonEduSaeeum', 'https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2201-2@1.0/GangwonEduSaeeum_OTFMediumA.woff'],
            GowunDodum: ['GowunDodum', 'https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2108@1.1/GowunDodum-Regular.woff'],
            HakgyoansimBadasseugiTTF: ['HakgyoansimBadasseugiTTF', 'https://fastly.jsdelivr.net/gh/projectnoonnu/2408-5@1.0/HakgyoansimBadasseugiTTF-L.woff2'],
            HakgyoansimGaeulsopung: ['HakgyoansimGaeulsopung', 'https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2307-2@1.0/HakgyoansimGaeulsopungL.woff2'],
            Handletter: ['Handletter', 'https://fastly.jsdelivr.net/gh/projectnoonnu/naverfont_05@1.0/Handletter.woff'],
            InkLipquid: ['InkLipquid', 'https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_one@1.0/InkLipquid.woff'],
            KyoboHand: ['KyoboHand', 'https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_20-04@1.0/KyoboHand.woff'],
            MapoFlowerIsland: ['MapoFlowerIsland', 'https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/MapoFlowerIslandA.woff'],
            NanumBarunpen: ['NanumBarunpen', 'https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_two@1.0/NanumBarunpen.woff'],
            Ownglyph_wiseelist: ['Ownglyph_wiseelist', 'https://fastly.jsdelivr.net/gh/projectnoonnu/2501-1@1.1/Ownglyph_wiseelist-Rg.woff2'],
            Pretendard: ['Pretendard', ''],
            RIDIBatang: ['RIDIBatang', 'https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_twelve@1.0/RIDIBatang.woff'],
        };

        const buildFontFace = (name, url) => `
@font-face {
font-family: '${name}';
src: url('${url}');
font-weight: normal;
font-style: normal;
font-display: swap;
}`;

        const transform = {
            scale: 1,
            translateX: -50,
            translateY: -50,
            originX: 50,
            originY: 50
        };

        const $ = id => document.getElementById(id);

        function setCookie(name, value, days = 90) {
            const expires = new Date(Date.now() + days * 864e5).toUTCString();
            document.cookie = `${encodeURIComponent(name)}=${encodeURIComponent(value)}; expires=${expires}; path=/`;
        }
        function getCookie(name) {
            return document.cookie.split('; ').reduce((res, cookie) => {
                const [key, val] = cookie.split('=');
                return key === encodeURIComponent(name) ? decodeURIComponent(val) : res;
            }, '');
        }
        function saveInputsToCookies() {
            document.querySelectorAll('input, select, textarea').forEach(el => {
                if (el.id && el.type !== 'file') {
                    setCookie(el.id, el.value);
                }
            });
            setCookie('selectedBgColor', document.querySelector('input[name="bgColor"]:checked').value);
            setCookie('selectedFontColor', document.querySelector('input[name="fontColor"]:checked').value);
        }
        function loadInputsFromCookies() {
            document.querySelectorAll('input, select, textarea').forEach(el => {
                if (el.id && el.type !== 'file') {
                    const value = getCookie(el.id);
                    if (value !== '') el.value = value;
                }
            });
            if ($('fontSelect').value == 'localFont') {
                $('fontSelect').value = 'Pretendard';
            }
            if (getCookie('selectedBgColor')) {
                document.querySelector(`input[name="bgColor"][value="${getCookie('selectedBgColor')}"]`).checked = true;
            }
            if (getCookie('selectedFontColor')) {
                document.querySelector(`input[name="fontColor"][value="${getCookie('selectedFontColor')}"]`).checked = true;
            }
        }

        function clearInputs(...ids) {
            ids.forEach(id => $(id).value = '');
            return false;
        }

        const img = $('background-img');

        function saveImageTransformToCookies() {
            Object.entries(transform).forEach(([key, val]) => setCookie(`transform_${key}`, val));
        }
        function loadImageTransformFromCookies() {
            Object.keys(transform).forEach(key => {
                const value = parseFloat(getCookie(`transform_${key}`));
                if (!isNaN(value)) {
                    transform[key] = value;
                }
            });
        }

        function setBgImgSrc(src) {
            img.src = src;
            if (src.startsWith('blob:')) {
                $('info-text').style.visibility = 'visible';
            }
            else {
                $('info-text').style.visibility = 'hidden';
            }
        }
        function applyFilters() {
            img.style.filter = `brightness(${$('brightness').value}%) contrast(${$('contrast').value}%) saturate(${$('saturate').value}%) blur(${$('blur').value}px)`;
        }
        function clickFileInput() {
            $('fileInput').click();
        }
        function updateTransform() {
            img.style.transform = `translate(${transform.translateX}%, ${transform.translateY}%) scale(${transform.scale})`;
            img.style.transformOrigin = `${transform.originX}% ${transform.originY}%`;
        }
        function zoom(factor) {
            transform.scale *= factor;
            updateTransform();
        }
        function move(dxPercent, dyPercent) {
            transform.translateX += dxPercent;
            transform.translateY += dyPercent;
            transform.originX -= dxPercent;
            transform.originY -= dyPercent;
            updateTransform();
        }
        function resetTransform() {
            const imgRatio = img.naturalWidth / img.naturalHeight;

            if (imgRatio > 1) {
                transform.scale = 1200 / img.naturalHeight;
            } else {
                transform.scale = 1200 / img.naturalWidth;
            }

            transform.translateX = -50;
            transform.translateY = -50;
            transform.originX = 50;
            transform.originY = 50;

            updateTransform();
            saveImageTransformToCookies();
        }

        function centerQuoteOutput() {
            const titleHeight = $('title-container').clientHeight;
            const authorHeight = $('author-container').clientHeight;
            const outputHeight = $('quoteOutput').clientHeight;

            let containerMarginBottom = 0;
            let titleBottom = 0;

            if (authorHeight != 0 && titleHeight != 0) {
                titleBottom = authorHeight + 14;
                containerMarginBottom = titleBottom + titleHeight + 16;
            }
            else if (authorHeight != 0) {
                containerMarginBottom = authorHeight + 16;
            }
            else if (titleHeight != 0) {
                containerMarginBottom = titleHeight + 16;
            }

            const containerHeight = 960 - containerMarginBottom;
            const marginTop = (containerHeight - outputHeight) / 2;

            $('title-container').style.bottom = `${titleBottom}px`;
            $('quote-container').style.height = `${containerHeight}px`;
            $('quoteOutput').style.marginTop = `${marginTop}px`;
        }

        function formatParagraphs(text) {
            return text.trim().split('\n').map(line => line.trim()).filter(Boolean).map(line => `<p>${line}</p>`).join('\n');
        }
        function changeText() {
            $('quoteOutput').innerHTML = formatParagraphs($('quote').value);
            $('titleOutput').textContent = $('title').value;
            $('authorOutput').textContent = $('author').value;
            centerQuoteOutput()
        }

        let previousFont;
        function changeFont() {
            if ($('fontSelect').value == 'localFont') {
                $('fontSelect').value = previousFont;
                $('fontInput').click();
                return;
            }
            previousFont = $('fontSelect').value;

            const [fontName, fontURL] = fontMap[$('fontSelect').value];
            if (fontName !== 'Pretendard') {
                $('webfont').innerHTML = buildFontFace(fontName, fontURL);
            }
            $('quoteOutput').style.fontFamily = fontName;
            document.fonts.load(`16px "${fontName}"`).then(() => centerQuoteOutput());
        }

        function applyQuoteStyles() {
            $('quoteOutput').style.fontSize = $('quoteSize').value + 'px';
            $('container').style.color = document.querySelector('input[name="fontColor"]:checked').value;
            $('quoteOutput').style.gap = $('quoteGap').value + 'em';
            $('quoteOutput').style.lineHeight = $('quoteLineHeight').value;
            $('quoteOutput').style.letterSpacing = $('quoteLetterSpacing').value + 'px';
            $('quoteOutput').style.wordSpacing = $('quoteWordSpacing').value + 'px';
            centerQuoteOutput()
        }

        function bindNumberInputButtons() {
            document.querySelectorAll('.number-input').forEach(wrapper => {
                const input = wrapper.querySelector('input');

                wrapper.querySelector('.minus').addEventListener('click', e => {
                    e.preventDefault();
                    input.stepDown();
                });

                wrapper.querySelector('.plus').addEventListener('click', e => {
                    e.preventDefault();
                    input.stepUp();
                });
            });
        }

        // 이미지로 저장
        async function downloadImage() {
            const title = $('title').value;
            const para = $('quote').value;
            const filename = `${title.slice(0, 10).trim()}-${para.slice(0, 10).trim()}`;

            htmlToImage.toJpeg($('result'), {
                quality: 0.95,
                width: 1200,
                height: 1200,
                pixelRatio: 1,
            }).then(dataUrl => {
                const link = document.createElement('a');
                link.download = `${filename}.jpg`;
                link.href = dataUrl;
                link.click();
            }).catch(error => console.error('이미지 저장 실패:', error));
        }

        // HTML 저장
        async function saveHTML() {
            const [templateRes, resultStyleRes] = await Promise.all([
                fetch('template.html'),
                fetch('result.css')
            ]);

            let template = await templateRes.text();
            const resultStyle = await resultStyleRes.text();

            const title = $('title').value;
            const para = $('quote').value;
            const filename = `${title.slice(0, 10).trim()}-${para.slice(0, 10).trim()}`;

            const webfontStyleHTML = document.querySelector('#webfont').outerHTML;
            const resultStyleHTML = `<style>\n${resultStyle}\n</style>`;

            let resultHTML = document.querySelector('#result-wrapper').outerHTML;

            if (img.src.startsWith('blob:')) {
                resultHTML = resultHTML.replace(/<img\b[^>]*?>/gi, '');
            }

            template = template
                .replace('{{title}}', title)
                .replace('{{resultStyle}}', resultStyleHTML)
                .replace('{{result}}', resultHTML);

            if ($('fontSelect').value == 'localFont') {
                template = template.replace('{{webfontStyle}}', '');
            }
            else {
                template = template.replace('{{webfontStyle}}', webfontStyleHTML);
            }

            const blob = new Blob([template], { type: "text/html" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `${filename}.html`;
            link.click();
            URL.revokeObjectURL(url);
        }

        function updateContentWidth() {
            const isPortrait = window.innerHeight > window.innerWidth;

            if (isPortrait) document.body.style.width = '600px';
            else document.body.style.width = '1200px';
        }

        // 이벤트 바인딩
        function bindEvents() {
            window.addEventListener('resize', updateContentWidth);

            let keepTransform = true;
            img.onload = () => {
                if (keepTransform) { // 쿠키에 저장된 이미지 주소 사용 시
                    updateTransform();
                    keepTransform = false;
                    return;
                }
                resetTransform();
            };
            img.onerror = () => {
                keepTransform = false;
                setBgImgSrc('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMjAwIiBoZWlnaHQ9IjEyMDAiPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiNCOUQ5RUIiIC8+PC9zdmc+');
            };

            $('quote').addEventListener('input', () => {
                const ifRidi = $('quote').value.match(/([\s\S]+?)\r?\n\r?\n(.+?) \| (.+?) 저\r?\n\r?\n리디에서 자세히 보기:/);
                const ifKyobo = $('quote').value.match(/([\s\S]+?)\r?\n\r?\n (.+?) 중에서\r?\n\r?\n 교보eBook/);
                const ifYes24 = $('quote').value.match(/([\s\S]+?)\r?\n\r?\n(.+?) [|｜∣] (.+?)\r?\n\r?\n\[크레마 예스24 eBook\]/);
                const ifAladin = $('quote').value.match(/([\s\S]+?)\r?\n\r?\n-알라딘 eBook \<(.+?)\> \((.+?)\) 중에서/);
                let body = '', title = '', author = '';
                if (ifRidi) [, body, title, author,] = ifRidi;
                if (ifKyobo) [, body, title,] = ifKyobo;
                if (ifYes24) [, body, title, author,] = ifYes24;
                if (ifAladin) [, body, title, author,] = ifAladin;
                if (ifRidi || ifKyobo || ifYes24 || ifAladin) {
                    $('quote').value = body;
                    $('title').value = title;
                    $('author').value = author;
                }
                changeText();
            });
            $('title').addEventListener('input', () => {
                $('titleOutput').textContent = $('title').value;
            });
            $('author').addEventListener('input', () => {
                $('authorOutput').textContent = $('author').value;
            });

            $('fontSelect').addEventListener('change', () => {
                changeFont();
            });
            $('fontInput').addEventListener('change', async (event) => {
                const file = event.target.files[0];
                if (!file) return;

                $('fontSelect').value = 'localFont';
                $('fontInput').value = '';

                const fontURL = URL.createObjectURL(file); // Blob URL 생성
                const fontName = 'localFont'; // 사용할 폰트 이름
                $('webfont').innerHTML = buildFontFace(fontName, fontURL);
                $('quoteOutput').style.fontFamily = fontName;
                document.fonts.load(`16px "${fontName}"`).then(() => centerQuoteOutput());
            });

            $('bgUrl').addEventListener('paste', (event) => {
                const items = event.clipboardData.items;
                for (let i = 0; i < items.length; i++) {
                    if (items[i].type.indexOf("image") !== -1) {
                        const blob = items[i].getAsFile();
                        $('bgUrl').value = URL.createObjectURL(blob);
                        break;
                    }
                }
            });
            $('bgUrl').addEventListener('input', () => {
                document.getElementById("bgColor0").checked = true;
                $('bgUrl').value = $('bgUrl').value.split(' ')[0];
                setBgImgSrc($('bgUrl').value);
            });
            $('fileInput').addEventListener('change', async () => {
                let file = $('fileInput').files[0];
                if (!file) return;

                $('fileInput').value = '';

                if (file.type === 'image/heic' || file.name.endsWith('.heic')) {
                    const output = await HeicTo({
                        blob: file,
                        toType: "image/jpeg",
                        quality: 0.95,
                    });
                    file = Array.isArray(output) ? output[0] : output;
                }

                document.getElementById("bgColor0").checked = true;
                $('bgUrl').value = URL.createObjectURL(file);
                setBgImgSrc($('bgUrl').value);
            });
            document.querySelectorAll('input[name="bgColor"]').forEach(input => {
                input.addEventListener('change', () => {
                    if (input.value == 'no') {
                        setBgImgSrc('');
                        return;
                    }
                    const svgString = '<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200"><rect width="100%" height="100%" fill="{{color}}" /></svg>';
                    const base64 = btoa(unescape(encodeURIComponent(svgString.replace('{{color}}', input.value))));
                    $('bgUrl').value = `data:image/svg+xml;base64,${base64}`
                    setBgImgSrc($('bgUrl').value);
                });
            });

            bindNumberInputButtons();

            document.querySelectorAll('form button:not([type="submit"])').forEach(btn =>
                btn.addEventListener('click', e => {
                    e.preventDefault();
                    applyFilters();
                    applyQuoteStyles();
                    saveInputsToCookies();
                    saveImageTransformToCookies();
                })
            );
            const inputs = document.querySelectorAll('input, select, textarea');
            for (const el of inputs) {
                const eventType = el.tagName === 'SELECT' ? 'change' : 'input';
                el.addEventListener(eventType, () => {
                    applyFilters();
                    applyQuoteStyles();
                    saveInputsToCookies();
                    saveImageTransformToCookies();
                });
            }
        }

        async function fetchCss() {
            const [resultStyleRes, controlStyleRes] = await Promise.all([
                fetch('result.css'),
                fetch('control.css')
            ]);

            const resultStyle = await resultStyleRes.text();
            const controlStyle = await controlStyleRes.text();

            $('result-style').innerHTML = resultStyle;
            $('control-style').innerHTML = controlStyle;

        }
        window.addEventListener('DOMContentLoaded', async () => {
            await fetchCss();
            updateContentWidth();
            loadInputsFromCookies();
            loadImageTransformFromCookies();
            bindEvents();
            setBgImgSrc($('bgUrl').value);
            applyFilters();
            changeText();
            changeFont();
            applyQuoteStyles();
            loadHtmlToImageScript();
        });
    </script>
</body>
</html>
