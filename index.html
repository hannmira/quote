<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=600">
    <title>발췌 이미지 생성기</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style id="webfont">
    </style>
    <style id="result-style">
    </style>
    <style id="control-style">
    </style>
</head>
<body>
    <div id="result-wrapper">
        <div id="result">
            <img id="background-img" crossorigin="anonymous" onerror="setBgImgSrc('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMjAwIiBoZWlnaHQ9IjEyMDAiPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiNmZmYiIC8+PC9zdmc+');">
            <div id="container">
                <div id="quotes-container">
                    <div id="quotesOutput">
                    </div>
                </div>
                <div id="title-container">
                    <p id="titleOutput"></p>
                </div>
                <div id="author-container">
                    <p id="authorOutput"></p>
                </div>
            </div>
        </div>
    </div>
    <div class="controls">
        <fieldset>
            <div class="flex-container-coloumn">
                <div class="flex-container">
                    <label>발췌 문장</label>
                    <a href="#" onclick="clearInputs('quotes', 'title', 'author')">지우기</a>
                </div>
                <textarea id="quotes" rows="5">이에 재판관 전원의 일치된 의견으로 주문을 선고합니다. 탄핵 사건이므로 선고시각을 확인하겠습니다. 지금 시각은 오전 11시 22분입니다.
주문: 피청구인 대통령 윤석열을 파면한다.
이것으로 선고를 마칩니다.</textarea>
            </div>
            <div class="flex-container">
                <label>글 제목</label>
                <input id="title" type="text" value="2024헌나8 대통령(윤석열)탄핵 선고요지">
                <label>저자 이름</label>
                <input id="author" type="text" value="헌법재판소">
            </div>
        </fieldset>
        <fieldset>
            <div class="flex-container-coloumn">
                <div class="flex-container">
                    <div>
                        <label>배경 이미지 URL(<a href="https://unsplash.com" target="_blank" rel="noopener noreferrer">Unsplash</a>) 또는</label><button id="local" onclick="clickFileInput()">로컬 파일</button>
                    </div>
                    <div id="image-controls">
                        <button class="bg-button" onclick="zoom(1.05)">+</button>
                        <button class="bg-button" onclick="zoom(0.95)">-</button>
                        <div style="width:7px;text-align: center;">|</div>
                        <button class="bg-button" onclick="move(0, -2)" style="font-size: 0.8em">▲</button>
                        <button class="bg-button" onclick="move(0, 2)" style="font-size: 0.8em">▼</button>
                        <button class="bg-button" onclick="move(-2, 0)" style="font-size: 0.8em">◀</button>
                        <button class="bg-button" onclick="move(2, 0)" style="font-size: 0.8em">▶</button>
                        <div style="width:7px;text-align: center;">|</div>
                        <button class="bg-button" onclick="resetImage()">↺</button>
                    </div>
                    <input type="file" id="fileInput" accept="image/*" style="display: none;">
                    <a href="#" onclick="clearInputs('bgUrl')">지우기</a>
                </div>
                <input id="bgUrl" value="https://images.unsplash.com/photo-1739659153856-ae22a5d2390a?q=80&w=1964&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
            </div>
            <form id="imageFilters" class="flex-container">
                <div>
                    <label>밝기<sub>%</sub></label>
                    <div class="number-input">
                        <button class="minus" type="button">−</button>
                        <input id="brightness" type="number" value="70" step="10">
                        <button class="plus" type="button">+</button>
                    </div>
                </div>
                <div>
                    <label>대비<sub>%</sub></label>
                    <div class="number-input">
                        <button class="minus" type="button">−</button>
                        <input id="contrast" type="number" value="100" step="10">
                        <button class="plus" type="button">+</button>
                    </div>
                </div>
                <div>
                    <label>채도<sub>%</sub></label>
                    <div class="number-input">
                        <button class="minus" type="button">−</button>
                        <input id="saturate" type="number" value="100" step="10">
                        <button class="plus" type="button">+</button>
                    </div>
                </div>
                <div>
                    <label>흐리게<sub>px</sub></label>
                    <div class="number-input">
                        <button class="minus" type="button">−</button>
                        <input id="blur" type="number" value="0" step="1">
                        <button class="plus" type="button">+</button>
                    </div>
                </div>
            </form>
        </fieldset>
        <form id="textSettings">
            <fieldset>
                <div class="flex-container">
                    <div>
                        <label>글꼴</label>
                        <select id="fontSelect">
                            <option value="RIDIBatang">리디바탕</option>
                            <option value="Pretendard">프리텐다드</option>
                            <option value="GangwonEdu">강원교육모두체</option>
                            <option value="GangwonEduSaeeum">강원교육새음체</option>
                            <option value="GangwonEduHyeonokT">강원교육현옥샘체</option>
                            <option value="GowunDodum">고운돋움</option>
                            <option value="KyoboHand">교보손글씨 2019</option>
                            <option value="DungGeunMo">둥근모꼴+Fixedsys</option>
                            <option value="Handletter">손편지체</option>
                            <option value="Ownglyph_wiseelist">온글잎 위씨리스트</option>
                            <option value="InkLipquid">잉크립퀴드체</option>
                            <option value="HakgyoansimGaeulsopung">학교안심 가을소풍</option>
                            <option value="HakgyoansimBadasseugiTTF">학교안심 받아쓰기</option>
                        </select>
                    </div>
                    <div>
                        <label>글씨 크기<sub>px</sub></label>
                        <div class="number-input">
                            <button class="minus" type="button">−</button>
                            <input id="quoteSize" type="number" value="50" step="1">
                            <button class="plus" type="button">+</button>
                        </div>
                    </div>
                    <div>
                        <label>글씨 색</label>
                        <select id="quoteColor">
                            <option value="White">White</option>
                            <option value="Black">Black</option>
                            <option value="DarkBlue" style="color:DarkBlue">DarkBlue</option>
                            <option value="DarkGray" style="color:DarkGray">DarkGray</option>
                            <option value="DarkGreen" style="color:DarkGreen">DarkGreen</option>
                            <option value="DarkRed" style="color:DarkRed">DarkRed</option>
                            <option value="LightBlue" style="color:LightBlue">LightBlue</option>
                            <option value="LightGray" style="color:LightGray">LightGray</option>
                            <option value="LightGreen" style="color:LightGreen">LightGreen</option>
                            <option value="LightPink" style="color:LightPink">LightPink</option>
                        </select>
                    </div>
                    <a href="#" onclick="reset()">초기화</a>
                </div>
                <div class="flex-container">
                    <div>
                        <label>줄높이</label>
                        <div class="number-input">
                            <button class="minus" type="button">−</button>
                            <input id="quoteLineHeight" type="number" value="1.6" step="0.1">
                            <button class="plus" type="button">+</button>
                        </div>
                    </div>
                    <div>
                        <label>문단간격<sub>em</sub></label>
                        <div class="number-input">
                            <button class="minus" type="button">−</button>
                            <input id="quoteMargin" type="number" value="1" step="0.1">
                            <button class="plus" type="button">+</button>
                        </div>
                    </div>
                    <div>
                        <label>자간<sub>px</sub></label>
                        <div class="number-input">
                            <button class="minus" type="button">−</button>
                            <input id="quoteLetterSpacing" type="number" value="-1" step="1">
                            <button class="plus" type="button">+</button>
                        </div>
                    </div>
                    <div>
                        <label>어간<sub>px</sub></label>
                        <div class="number-input">
                            <button class="minus" type="button">−</button>
                            <input id="quoteWordSpacing" type="number" value="0" step="1">
                            <button class="plus" type="button">+</button>
                        </div>
                    </div>
                </div>
            </fieldset>
        </form>
        <div class="flex-container">
            <div id="info-text">HTML 저장 시 로컬 이미지 파일 배경은 저장되지 않습니다.</div>
            <button type="submit" onclick="saveHTML()">HTML로 저장</button>
            <button type="submit" onclick="downloadImage()">이미지로 저장</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>
    <script>
        const fontMap = {
            RIDIBatang: ['RIDIBatang', 'projectnoonnu/noonfonts_twelve@1.0/RIDIBatang.woff'],
            Pretendard: ['Pretendard', ''],
            GangwonEdu: ['GangwonEdu', 'projectnoonnu/noonfonts_2201-2@1.0/GangwonEdu_OTFLightA.woff'],
            GangwonEduSaeeum: ['GangwonEduSaeeum', 'projectnoonnu/noonfonts_2201-2@1.0/GangwonEduSaeeum_OTFMediumA.woff'],
            GowunDodum: ['GowunDodum', 'projectnoonnu/noonfonts_2108@1.1/GowunDodum-Regular.woff'],
            InkLipquid: ['InkLipquid', 'projectnoonnu/noonfonts_one@1.0/InkLipquid.woff'],
            HakgyoansimGaeulsopung: ['HakgyoansimGaeulsopung', 'projectnoonnu/noonfonts_2307-2@1.0/HakgyoansimGaeulsopungL.woff2'],
            GangwonEduHyeonokT: ['GangwonEduHyeonokT', 'projectnoonnu/noonfonts_2201-2@1.0/GangwonEduHyeonokT_OTFMediumA.woff'],
            KyoboHand: ['KyoboHand', 'projectnoonnu/noonfonts_20-04@1.0/KyoboHand.woff'],
            DungGeunMo: ['DungGeunMo', 'projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff'],
            Handletter: ['Handletter', 'projectnoonnu/naverfont_05@1.0/Handletter.woff'],
            Ownglyph_wiseelist: ['Ownglyph_wiseelist', 'projectnoonnu/2501-1@1.1/Ownglyph_wiseelist-Rg.woff2'],
            HakgyoansimBadasseugiTTF: ['HakgyoansimBadasseugiTTF', 'projectnoonnu/2408-5@1.0/HakgyoansimBadasseugiTTF-L.woff2'],
        };

        const buildFontFace = (name, url, format = 'woff') => `
@font-face {
font-family: '${name}';
src: url('https://fastly.jsdelivr.net/gh/${url}') format('${format}');
font-weight: normal;
font-style: normal;
font-display: swap;
}`;

        // 쿠키 관련
        function setCookie(name, value, days = 90) {
            const expires = new Date(Date.now() + days * 864e5).toUTCString();
            document.cookie = `${encodeURIComponent(name)}=${encodeURIComponent(value)}; expires=${expires}; path=/`;
        }

        function getCookie(name) {
            return document.cookie.split('; ').reduce((res, cookie) => {
                const [key, val] = cookie.split('=');
                return key === encodeURIComponent(name) ? decodeURIComponent(val) : res;
            }, '');
        }

        // 입력 저장/복원
        function saveInputsToCookies() {
            document.querySelectorAll('input, select, textarea').forEach(el => {
                if (el.id && el.type !== 'file') {
                    setCookie(el.id, el.value);
                }
            });
        }

        function loadInputsFromCookies() {
            document.querySelectorAll('input, select, textarea').forEach(el => {
                if (el.id && el.type !== 'file') {
                    const value = getCookie(el.id);
                    if (value !== '') el.value = value;
                }
            });
        }

        const $ = id => document.getElementById(id);

        function clearInputs(...ids) {
            ids.forEach(id => $(id).value = '');
            return false;
        }

        const img = $('background-img');

        function setBgImgSrc(src) {
            img.onload = function () {
                if (resetImg) {
                    $('imageFilters').reset();
                    applyChanges();
                    resetImage();
                    resetImg = false;
                }
                else {
                    updateTransform();
                }
            };
            if (src) {
                img.src = src;
                if (src.startsWith('data:')) $('info-text').style.visibility = 'visible';
            }
            else if (/^https?:/.test($('bgUrl').value)) {
                img.src = $('bgUrl').value;
                $('info-text').style.visibility = 'hidden';
            }
        }

        let scale = 0.62;
        let translateX = -50;
        let translateY = -50;
        let transformOriginX = 50;
        let transformOriginY = 50;
        let resetImg = false;

        function updateTransform() {
            img.style.transform = `translate(${translateX}%, ${translateY}%) scale(${scale})`;
            img.style.transformOrigin = `${transformOriginX}% ${transformOriginY}%`;
            saveImageTransformToCookies();
        }
        function saveImageTransformToCookies() {
            setCookie('image_scale', scale);
            setCookie('image_translateX', translateX);
            setCookie('image_translateY', translateY);
            setCookie('image_transformOriginX', transformOriginX);
            setCookie('image_transformOriginY', transformOriginY);
        }
        function loadImageTransformFromCookies() {
            const savedScale = parseFloat(getCookie('image_scale'));
            const savedX = parseFloat(getCookie('image_translateX'));
            const savedY = parseFloat(getCookie('image_translateY'));
            const savedOriginX = parseFloat(getCookie('image_transformOriginX'));
            const savedOriginY = parseFloat(getCookie('image_transformOriginY'));

            if (!isNaN(savedScale)) scale = savedScale;
            if (!isNaN(savedX)) translateX = savedX;
            if (!isNaN(savedY)) translateY = savedY;
            if (!isNaN(savedOriginX)) transformOriginX = savedOriginX;
            if (!isNaN(savedOriginY)) transformOriginY = savedOriginY;

            updateTransform();
        }
        function zoom(factor) {
            scale *= factor;
            updateTransform();
        }
        function move(dxPercent, dyPercent) {
            translateX += dxPercent;
            translateY += dyPercent;
            transformOriginX -= dxPercent;
            transformOriginY -= dyPercent;
            updateTransform();
        }
        function resetImage() {
            const imgRatio = img.naturalWidth / img.naturalHeight;

            if (imgRatio > 1) {
                scale = 1200 / img.naturalHeight;
            } else {
                scale = 1200 / img.naturalWidth;
            }

            translateX = -50;
            translateY = -50;
            transformOriginX = 50;
            transformOriginY = 50;

            updateTransform();
        }

        function clickFileInput() {
            fileInput.click();
        }
        $('fileInput').addEventListener('change', async () => {
            const file = fileInput.files[0];
            if (!file) return;

            resetImg = true;
            $('bgUrl').value = '로컬 이미지 파일'
            const reader = new FileReader();
            reader.onload = async function (e) {
                await setBgImgSrc(e.target.result);
                saveInputsToCookies();
            };
            reader.readAsDataURL(file);
        });

        // 텍스트 포맷팅
        function formatParagraphs(text) {
            return text.trim().split('\n').map(line => line.trim()).filter(Boolean).map(line => `<p>${line}</p>`).join('\n');
        }

        // 레이아웃 중앙 정렬
        function centerQuotesOutput() {
            const titleHeight = $('title-container').clientHeight;
            const authorHeight = $('author-container').clientHeight;
            const outputHeight = $('quotesOutput').clientHeight;

            let containerMarginBottom = 0;
            let titleBottom = 0;

            if (authorHeight != 0 && titleHeight != 0) {
                titleBottom = authorHeight + 14;
                containerMarginBottom = titleBottom + titleHeight + 16;
            }
            else if (authorHeight != 0) {
                containerMarginBottom = authorHeight + 16;
            }
            else if (titleHeight != 0) {
                containerMarginBottom = titleHeight + 16;
            }

            const containerHeight = 960 - containerMarginBottom;
            const marginTop = (containerHeight - outputHeight) / 2;

            $('title-container').style.bottom = `${titleBottom}px`;
            $('quotes-container').style.height = `${containerHeight}px`;
            $('quotesOutput').style.marginTop = `${marginTop}px`;
        }

        document.fonts.ready.then(function () {
            $('quotesOutput').style.display = 'none';
            requestAnimationFrame(() => {
                $('quotesOutput').style.display = '';
                centerQuotesOutput();
            });
        });

        // 스타일 반영
        function applyChanges() {
            saveInputsToCookies();

            $('quotesOutput').innerHTML = formatParagraphs($('quotes').value);
            $('titleOutput').textContent = $('title').value;
            $('authorOutput').textContent = $('author').value;

            $('background-img').style.filter = `brightness(${$('brightness').value}%) contrast(${$('contrast').value}%) saturate(${$('saturate').value}%) blur(${$('blur').value}px)`;

            const [fontName, fontURL] = fontMap[$('fontSelect').value];
            if (fontName !== 'Pretendard') {
                $('webfont').innerHTML = buildFontFace(fontName, fontURL, fontURL.endsWith('.woff2') ? 'woff2' : 'woff');
                document.fonts.load(`16px "${fontName}"`).then(() => {
                    $('quotesOutput').style.display = 'none';
                    requestAnimationFrame(() => {
                        $('quotesOutput').style.display = '';
                        centerQuotesOutput();
                    });
                });
            }

            $('result').style.color = $('quoteColor').value;
            document.querySelectorAll('#quotesOutput p').forEach(p => {
                p.style.fontFamily = fontName;
                p.style.fontSize = $('quoteSize').value + 'px';
                p.style.lineHeight = $('quoteLineHeight').value;
                p.style.marginBottom = $('quoteMargin').value + 'em';
                p.style.letterSpacing = $('quoteLetterSpacing').value + 'px';
                p.style.wordSpacing = $('quoteWordSpacing').value + 'px';
            });

            centerQuotesOutput();
        }

        function bindNumberInputButtons() {
            document.querySelectorAll('.number-input').forEach(wrapper => {
                const input = wrapper.querySelector('input');

                wrapper.querySelector('.minus').addEventListener('click', e => {
                    e.preventDefault();
                    input.stepDown();
                    applyChanges();
                });

                wrapper.querySelector('.plus').addEventListener('click', e => {
                    e.preventDefault();
                    input.stepUp();
                    applyChanges();
                });
            });
        }

        // 이미지 다운로드
        async function downloadImage() {
            const title = $('title').value;
            const para = $('quotes').value;
            const filename = `${title.slice(0, 10).trim()}-${para.slice(0, 10).trim()}`;

            await document.fonts.ready;
            if (!img.complete) {
                await new Promise(resolve => {
                    img.onload = resolve;
                    img.onerror = resolve;
                });
            }

            await img.decode();
            await new Promise(resolve => setTimeout(resolve, 50));

            htmlToImage.toJpeg($('result'), {
                quality: 0.95,
                width: 1200,
                height: 1200,
                pixelRatio: 1,
            }).then(dataUrl => {
                const link = document.createElement('a');
                link.download = `${filename}.jpg`;
                link.href = dataUrl;
                link.click();
            }).catch(error => console.error('이미지 저장 실패:', error));
        }

        // HTML 저장
        async function saveHTML() {
            const [templateRes, resultStyleRes] = await Promise.all([
                fetch('template.html'),
                fetch('result.css')
            ]);

            let template = await templateRes.text();
            const resultStyle = await resultStyleRes.text();

            const title = $('title').value;
            const para = $('quotes').value;
            const filename = `${title.slice(0, 10).trim()}-${para.slice(0, 10).trim()}`;

            const webfontStyleHTML = document.querySelector('#webfont').outerHTML;
            const resultStyleHTML = `<style>\n${resultStyle}\n</style>`;

            let resultHTML = document.querySelector('#result-wrapper').outerHTML;

            if (img.src.startsWith('data:')) {
                resultHTML = resultHTML.replace(/<img\b[^>]*?>/gi, '');
            }

            template = template
                .replace('{{title}}', title)
                .replace('{{webfontStyle}}', webfontStyleHTML)
                .replace('{{resultStyle}}', resultStyleHTML)
                .replace('{{result}}', resultHTML);

            const blob = new Blob([template], { type: "text/html" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `${filename}.html`;
            link.click();
            URL.revokeObjectURL(url);
        }

        // 리셋
        function reset() {
            $('textSettings').reset();
            applyChanges();
        }

        // 이벤트 바인딩
        function bindEvents() {
            document.querySelectorAll('form button:not([type="submit"])').forEach(btn =>
                btn.addEventListener('click', e => {
                    e.preventDefault();
                    applyChanges();
                })
            );

            const inputs = document.querySelectorAll('input, select, textarea');
            for (const el of inputs) {
                const eventType = el.tagName === 'SELECT' ? 'change' : 'input';
                el.addEventListener(eventType, () => {
                    applyChanges();
                    if (el.id === 'bgUrl') {
                        setBgImgSrc();
                        resetImg = true;
                    }
                });
            }

            bindNumberInputButtons();
        }

        async function fetchCss() {
            const [resultStyleRes, controlStyleRes] = await Promise.all([
                fetch('result.css'),
                fetch('control.css')
            ]);

            const resultStyle = await resultStyleRes.text();
            const controlStyle = await controlStyleRes.text();

            $('result-style').innerHTML = resultStyle;
            $('control-style').innerHTML = controlStyle;
        }

        window.addEventListener('DOMContentLoaded', async () => {
            await fetchCss();
            loadInputsFromCookies();
            setBgImgSrc();
            applyChanges();
            loadImageTransformFromCookies();
            bindEvents();
        });
    </script>
</body>
</html>
