<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>{{title}}</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
{{webfontStyle}}
{{resultStyle}}
</head>
<body>
    {{result}}
    <button id="downlaod-image" type="submit" onclick="downloadImage()">이미지로 저장</button>
    <script>
        function loadHtmlToImageScript() {
            const script = document.createElement("script");
            if (/firefox/i.test(navigator.userAgent)) {
                script.src = "https://cdn.jsdelivr.net/npm/html-to-image@1.9.0/dist/html-to-image.min.js";
            } else {
                script.src = "https://cdn.jsdelivr.net/npm/html-to-image@1.11.13/dist/html-to-image.min.js";
            }
            document.head.appendChild(script);
        }
        function downloadImage() {
            const title = document.title;
            const para = document.getElementById('quotesOutput').innerText;
            const filename = `${title.slice(0, 10).trim()}-${para.slice(0, 10).trim()}`;

            htmlToImage.toJpeg(document.getElementById('result'), {
                quality: 0.95,
                width: 1200,
                height: 1200,
                pixelRatio: 1,
            }).then(dataUrl => {
                const link = document.createElement('a');
                link.download = `${filename}.jpg`;
                link.href = dataUrl;
                link.click();
            }).catch(error => console.error('이미지 저장 실패:', error));
        }
        loadHtmlToImageScript();
    </script>
</body>
</html>
